version: '3.8'

services:
  # Наша база даних
  db:
    image: postgres:15-alpine
    container_name: eduspace_db
    environment:
      POSTGRES_DB: eduspace
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123 # Потім колеги змінять у себе в .env
    ports:
      - "5432:5432"
    volumes:
      - eduspace_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eduspace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Візуальний інтерфейс для бази (щоб не тільки через код дивитися)
  pgadmin:
    image: dpage/pgadmin4
    container_name: eduspace_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  eduspace_data:
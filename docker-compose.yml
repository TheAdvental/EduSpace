version: '3.8'

services:
  db:
    image: postgres:16-alpine # Використовуємо свіжу та легку версію
    container_name: eduspace-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data # Критично для збереження даних
    ports:
      - "5432:5432" # Відкрий тільки якщо треба підключитися з дому через pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Візуальний інтерфейс для бази (щоб не тільки через код дивитися)
  pgadmin:
    image: dpage/pgadmin4
    container_name: eduspace_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  eduspace_data:
name: Frontend CI

on:
  push:
    branches: [ main ]
    paths: [ 'src/eduspace-ui/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd src/eduspace-ui
        npm install

    - name: Build
      run: |
        cd src/eduspace-ui
        npm run build
name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0
      - name: Restore dependencies
        run: dotnet restore src/EduSpace.slnx

      - name: Build
        run: dotnet build src/EduSpace.Api/EduSpace.Api.csproj --no-restore